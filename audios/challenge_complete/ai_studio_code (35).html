<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manya | Dopamine Engine Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --cyan: #00f2ff;
            --gold: #ffcc00;
            --emerald: #00ff88;
            --danger: #ff0055;
        }

        body {
            background-color: #05070a;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
        }

        .font-hud { font-family: 'Orbitron', sans-serif; }

        /* Background Rays Animation */
        .rays {
            position: fixed;
            top: 50%; left: 50%;
            width: 300vw; height: 300vw;
            background: conic-gradient(from 0deg, transparent, rgba(0, 242, 255, 0.1), transparent 20deg);
            animation: rotate 20s linear infinite;
            transform: translate(-50%, -50%);
            z-index: -1;
            display: none;
        }

        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* Effects Classes */
        .glitch { animation: glitch 0.2s ease-in-out infinite; }
        @keyframes glitch {
            0% { transform: translate(0); filter: hue-rotate(0deg); }
            30% { transform: translate(-5px, 2px); filter: hue-rotate(90deg); }
            60% { transform: translate(5px, -2px); filter: hue-rotate(180deg); }
            100% { transform: translate(0); }
        }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(2px, 2px); } 75% { transform: translate(-2px, -2px); } }

        .gold-glow {
            background: linear-gradient(180deg, #fff 0%, var(--gold) 50%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 204, 0, 0.6));
        }

        /* Leaderboard Item Animation */
        .leader-row { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="flex">

    <!-- THE VISUAL STAGE (Left Side) -->
    <div class="w-2/3 h-full relative flex flex-col items-center justify-center border-r border-white/10 overflow-hidden">
        <div class="rays" id="bg-rays"></div>
        
        <!-- Checklist (Completion Bias) -->
        <div id="stage-checklist" class="flex gap-2 mb-12"></div>

        <!-- Main Banner (The Big Win) -->
        <div id="stage-banner" class="text-center opacity-0 scale-50 transition-all duration-700">
            <h2 class="font-hud text-2xl tracking-[1.5rem] text-cyan-400">MISSION</h2>
            <h1 class="font-hud text-9xl gold-glow leading-none">SUCCESS</h1>
        </div>

        <!-- Stats Row (Number Go Up) -->
        <div id="stage-stats" class="flex gap-20 mt-12 opacity-0">
            <div class="text-center">
                <div class="text-[10px] font-hud text-emerald-400">TOTAL XP</div>
                <div id="xp-val" class="text-5xl font-hud">0</div>
            </div>
            <div class="text-center">
                <div class="text-[10px] font-hud text-emerald-400">GLOBAL RANK</div>
                <div id="rank-val" class="text-5xl font-hud">#10</div>
            </div>
        </div>

        <!-- Progress Bar (Near-Miss) -->
        <div id="stage-progress" class="w-96 mt-12 opacity-0">
            <div class="flex justify-between text-[10px] font-hud text-white/40 mb-1">
                <span>LVL 14</span>
                <span>LVL 15</span>
            </div>
            <div class="h-2 bg-white/10 rounded-full overflow-hidden border border-white/10">
                <div id="progress-fill" class="h-full bg-cyan-400 w-0 transition-all duration-[3000ms]"></div>
            </div>
            <div class="text-center text-[8px] mt-2 text-cyan-400 font-hud">98% TO NEXT MASTER RANK</div>
        </div>

        <!-- Leaderboard (Social Comparison) -->
        <div id="stage-leaderboard" class="mt-10 w-64 bg-black/40 border border-white/10 p-4 rounded-lg hidden">
            <h4 class="text-[8px] font-hud text-white/40 mb-3 text-center tracking-widest">TOP OPERATORS</h4>
            <div id="leader-list" class="space-y-1">
                <div class="flex justify-between text-[10px] opacity-30"><span>1. Pro_Manya</span><span>99k</span></div>
                <div class="flex justify-between text-[10px] opacity-30"><span>2. BioHacker</span><span>92k</span></div>
                <div id="player-row" class="flex justify-between text-[10px] bg-cyan-500/20 p-1 text-cyan-400"><span>10. YOU</span><span>2.4k</span></div>
            </div>
        </div>
    </div>

    <!-- CONTROL PANEL (Right Side) -->
    <div class="w-1/3 h-full bg-[#0a0c10] p-8 flex flex-col gap-6 overflow-y-auto">
        <div class="border-b border-white/10 pb-4">
            <h1 class="font-hud text-xl text-cyan-400">DOPAMINE_CONSOLE</h1>
            <p class="text-[10px] text-white/40">v4.0 - RESEARCH DRIVEN FEEDBACK</p>
        </div>

        <div class="space-y-4">
            <h3 class="text-xs font-bold text-white/60 uppercase tracking-widest">1. Behavioral Triggers</h3>
            <button onclick="triggerChecklist()" class="w-full text-left p-4 bg-white/5 border border-white/10 hover:bg-white/10 transition-all text-xs font-hud">
                [ TRIGGER_CHECKLIST ] <br><span class="opacity-50 text-[10px]">Reinforce Completion Bias</span>
            </button>
            <button onclick="triggerBanner()" class="w-full text-left p-4 bg-white/5 border border-white/10 hover:bg-white/10 transition-all text-xs font-hud">
                [ SLAM_SUCCESS_BANNER ] <br><span class="opacity-50 text-[10px]">The "Big Win" Emotional Peak</span>
            </button>
            <button onclick="triggerLeaderboard()" class="w-full text-left p-4 bg-white/5 border border-white/10 hover:bg-white/10 transition-all text-xs font-hud">
                [ RANK_HIERARCHY_CLIMB ] <br><span class="opacity-50 text-[10px]">Social Status Comparison</span>
            </button>
            <button onclick="triggerProgress()" class="w-full text-left p-4 bg-white/5 border border-white/10 hover:bg-white/10 transition-all text-xs font-hud">
                [ NEAR_MISS_PROGRESS ] <br><span class="opacity-50 text-[10px]">The "Goal Gradient" Effect</span>
            </button>
        </div>

        <div class="space-y-4">
            <h3 class="text-xs font-bold text-white/60 uppercase tracking-widest">2. Sensory Overload</h3>
            <button onclick="triggerParticles()" class="w-full text-left p-4 border border-emerald-500/50 bg-emerald-500/5 hover:bg-emerald-500/10 transition-all text-xs font-hud text-emerald-400">
                [ START_INFINITE_CONFETTI ] <br><span class="opacity-50 text-[10px]">Visual Flood (50s Loop)</span>
            </button>
            <button onclick="triggerGlitch()" class="w-full text-left p-4 border border-pink-500/50 bg-pink-500/5 hover:bg-pink-500/10 transition-all text-xs font-hud text-pink-400">
                [ SCREEN_GLITCH_BURST ] <br><span class="opacity-50 text-[10px]">High-Intensity Juicy Feedback</span>
            </button>
        </div>

        <div class="mt-auto">
            <button onclick="triggerFullShow()" class="w-full py-6 bg-cyan-500 text-black font-hud text-lg hover:bg-white transition-all shadow-[0_0_30px_rgba(0,242,255,0.4)]">
                LAUNCH FULL SHOW
            </button>
        </div>
    </div>

    <script>
        // Audio Objects
        const sounds = {
            click: new Audio('click.mp3'),
            complete: new Audio('complete.mp3'),
            riser: new Audio('riser.mp3'),
            bass: new Audio('bass_drop.mp3'),
            whoosh: new Audio('whoosh.mp3'),
            hit: new Audio('hitmarker.mp3')
        };

        function sfx(name) {
            if(sounds[name]) {
                sounds[name].currentTime = 0;
                sounds[name].play().catch(e => console.log("Audio waiting for user."));
            }
        }

        // 1. Completion Bias Checklist
        function triggerChecklist() {
            const container = document.getElementById('stage-checklist');
            container.innerHTML = '';
            for(let i=1; i<=5; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = "p-2 bg-emerald-500/20 border border-emerald-500 rounded text-[8px] font-hud animate-bounce";
                    el.innerHTML = `Q0${i}<br>DONE`;
                    container.appendChild(el);
                    sfx('hit');
                }, i * 300);
            }
        }

        // 2. The Big Win Banner
        function triggerBanner() {
            const banner = document.getElementById('stage-banner');
            const bg = document.getElementById('bg-rays');
            bg.style.display = 'block';
            banner.classList.replace('opacity-0', 'opacity-100');
            banner.classList.replace('scale-50', 'scale-100');
            sfx('bass');
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 500);
            
            // Start XP Ticker
            document.getElementById('stage-stats').classList.remove('opacity-0');
            let xp = 0;
            const interval = setInterval(() => {
                xp += 115;
                document.getElementById('xp-val').innerText = xp.toLocaleString();
                if(xp >= 15000) {
                    document.getElementById('xp-val').innerText = "15,000";
                    clearInterval(interval);
                }
            }, 30);
        }

        // 3. Social Hierarchy (Leaderboard)
        function triggerLeaderboard() {
            const lb = document.getElementById('stage-leaderboard');
            lb.classList.remove('hidden');
            const playerRow = document.getElementById('player-row');
            sfx('riser');

            let rank = 10;
            const climb = setInterval(() => {
                if(rank > 1) {
                    rank--;
                    sfx('whoosh');
                    playerRow.innerHTML = `<span>${rank}. YOU</span><span>${(15000 - rank*200)}</span>`;
                    playerRow.classList.add('glitch');
                    setTimeout(() => playerRow.classList.remove('glitch'), 100);
                    document.getElementById('rank-val').innerText = `#${rank}`;
                } else {
                    clearInterval(climb);
                    sfx('bass');
                    playerRow.className = "flex justify-between text-[10px] bg-emerald-500 p-1 text-black font-bold scale-110 transition-all";
                }
            }, 600);
        }

        // 4. Goal Gradient (Progress Bar)
        function triggerProgress() {
            document.getElementById('stage-progress').classList.remove('opacity-0');
            sfx('riser');
            setTimeout(() => {
                document.getElementById('progress-fill').style.width = "98%";
            }, 100);
        }

        // 5. Visual Overload (Endless)
        let confettiInterval;
        function triggerParticles() {
            sfx('complete');
            const end = Date.now() + (50 * 1000);
            const colors = ['#00f2ff', '#ffcc00', '#00ff88'];

            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
                
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        // 6. Juicy Glitch
        function triggerGlitch() {
            document.body.classList.add('glitch');
            sfx('whoosh');
            setTimeout(() => document.body.classList.remove('glitch'), 500);
        }

        // THE FULL SHOW (Sequential Dopamine Drip)
        function triggerFullShow() {
            triggerChecklist();
            setTimeout(triggerBanner, 2000);
            setTimeout(triggerParticles, 2500);
            setTimeout(triggerProgress, 4000);
            setTimeout(triggerLeaderboard, 6000);
        }
    </script>
</body>
</html>
